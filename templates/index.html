<!DOCTYPE html>
<html>
<head>
    <title>PDF to Braille</title>
</head>
<body>

    <h1>Upload PDF</h1>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <!-- CRITICAL: name MUST be "file" -->
        <input type="file" name="file" accept=".pdf" required>
        <br><br>
        <input type="submit" value="Upload">
    </form>

</body>
</html>
